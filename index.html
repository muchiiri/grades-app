<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Grading APP</title>
</head>
<body>
    <div class="container">
        <section class="card">
            <h1>Student Grades</h1>
            <p class="intro">Manage and view student grades efficiently.</p>
            <form id="gradeForm" class="grade-form">
                <div class="form-group">
                    <label for="studentName">Student Name</label>
                    <input type="text" id="studentName" name="studentName" placeholder="Enter Student Name" required>
                </div>
                <div class="form-group">
                    <label for="studentId">Student ID</label>
                    <input type="number" id="studentId" name="studentId" placeholder="Enter Student ID" required>
                </div>
                <div class="form-group">
                    <label for="studentGrade">Grade</label>
                    <input type="number" id="studentGrade" name="studentGrade" placeholder="Enter Grade" required>
                </div>
                <div class="form-group">
                    <label for="studentEmail">Student Email</label>
                    <input type="email" id="studentEmail" name="studentEmail" placeholder="Enter Student Email" required>
                </div>
                <div class="actions">
                    <button type="submit">Add Grade</button>
                    <button type="button" id="clearAllBtn"> Clear All</button>
                </div>
            </form>
            <p id="message" class="message"></p>
        </section>
        <section class="card">
            <h2> Students Grades List</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>ID</th>
                            <th>Grade</th>
                            <th>Email</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="gradesTableBody">
                        <td colspan="5" class="empty-state">No student grades to display at the moment.</td>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
